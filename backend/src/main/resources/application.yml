server:
  port: 8090

spring:
  application:
    name: campus-takeout
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/campus_takeout?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 20MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# 文件上传根目录（相对项目运行目录），数据库只存相对路径，迁移时只需迁移此目录
file:
  upload-dir: uploads

# JWT 配置
jwt:
  secret: ${JWT_SECRET:campus-takeout-demo-secret-change-me}
  # token 有效期（毫秒），7 天
  expire: 604800000

# 智能助手（AI）配置：密钥仅保存在后端，前端与页面不暴露
ai:
  # OpenAI 兼容对话接口
  api-url: ${AI_API_URL:https://spark-api-open.xf-yun.com/v1/chat/completions}
  # 接口鉴权口令（控制台获取的 APIPassword，格式 key:secret）
  api-password: ${AI_API_PASSWORD:}
  # 模型版本（Pro）
  model: ${AI_MODEL:generalv3}
  # 单次回复最大长度
  max-tokens: 1024
